relationships:
  - target_entity: "silver_ecc_sd_trading_goods"
    relationship_type: "many_to_one"
    join_condition: "SILVER_ECC_SD_SALES_ORDER.matnr_vbap = SILVER_TRADING_GOODS.matnr_mara"
    semantic_label: "material_of"
    traversal_cost: 2
    aggregation_safety: "safe"
    cross_module: true
    description: "Join to Material Master for material attributes"

  - target_entity: "silver_ecc_sd_plant"
    relationship_type: "many_to_one"
    join_condition: "SILVER_ECC_SD_SALES_ORDER.werks_vbap = SILVER_PLANTS.werks_t001w"
    semantic_label: "fulfilled_from"
    traversal_cost: 1.5
    aggregation_safety: "safe"
    cross_module: true
    description: "Plant responsible for shipping the items"

  - target_entity: "silver_ecc_sd_sales_organization"
    relationship_type: "many_to_one"
    join_condition: "SILVER_ECC_SD_SALES_ORDER.vkorg_vbak = SILVER_SALES_ORGANIZATION.vkorg_tvkot"
    semantic_label: "sold_by_org"
    traversal_cost: 1
    aggregation_safety: "safe"
    cross_module: false
    description: "Sales organization that owns the order"

  - target_entity: "silver_ecc_sd_customer_master"
    relationship_type: "many_to_one"
    join_condition: "SILVER_ECC_SD_SALES_ORDER.kunnr_vbak = SILVER_SD_CUSTOMER_MASTER.kunnr_kna1"
    semantic_label: "sold_to_customer"
    traversal_cost: 1
    aggregation_safety: "safe"
    cross_module: false
    description: "Customer/ sold to party / Customer detail"

  - target_entity: "silver_ecc_mm_inv_mov_stock"
    relationship_type: "many_to_many"
    join_condition: "SILVER_SD_SALES_ORDER.matnr_vbap = SILVER_MM_INVENTORY_MOVEMENT.matnr_marc AND SILVER_SD_SALES_ORDER.werks_vbap = SILVER_MM_INVENTORY_MOVEMENT.werks_marc"
    semantic_label: "demands_stock_from"
    traversal_cost: 3
    aggregation_safety: "requires_dedup"
    cross_module: true
    description: "Links sales order demand to inventory stock position by material and plant. Enables demand vs supply coverage analysis."
